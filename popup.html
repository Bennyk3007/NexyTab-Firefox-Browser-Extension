<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexyTab Controls</title>
  <link rel="stylesheet" href="popup.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="button-group">
    
    <!-- 1. RELOAD ALL (Orange, Standard Repeat) -->
    <button type="button" id="reload-all" title="Reload All Tabs" aria-label="Reload All Tabs">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
      </svg>
    </button>
    
    <!-- 2. Random Tab (Green, User Preferred Shuffle Icon) -->
    <button type="button" id="random" title="Go To Random Tab" aria-label="Go To Random Tab">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M14.83 13.41L13.42 14.82L16.55 17.95L14.5 20H20V14.5L17.96 16.54L14.83 13.41ZM14.5 4L16.54 6.04L4 18.59L5.41 20L17.96 7.46L20 9.5V4H14.5ZM5.41 4L4 5.41L10.59 12L12 10.59L5.41 4Z"/>
      </svg>
    </button>

    <!-- 3. Previous Tab -->
    <button type="button" id="left" title="Previous Tab" aria-label="Previous Tab">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
      </svg>
    </button>
    
    <!-- 4. Play/Pause -->
    <button type="button" id="play-pause" title="Start Rotating Tabs" aria-label="Start Rotating Tabs">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M8 5v14l11-7z" />
      </svg>
    </button>
    
    <!-- 5. Next Tab -->
    <button type="button" id="right" title="Next Tab" aria-label="Next Tab">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
      </svg>
    </button>

    <!-- 6. RELOAD CURRENT (Green, Repeat One Icon) -->
    <button type="button" id="reload-current" title="Reload Current Tab" aria-label="Reload Current Tab">
       <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/>
      </svg>
    </button>

    <!-- 7. Tab Sleeping Toggle (Button Style) -->
    <button type="button" id="sleep-toggle" title="Tab Sleeping - OFF" aria-label="Toggle Tab Sleeping">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
      </svg>
    </button>

    <!-- 8. Time Stepper -->
    <div class="time-stepper">
      <!-- Fixed: Removed periods from titles/labels -->
      <button type="button" id="time-decrease" title="Decrease Time" aria-label="Decrease Time">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 13H5v-2h14v2z"/>
        </svg>
      </button>
      <output id="time-display" aria-live="polite">1s</output>
      <button type="button" id="time-increase" title="Increase Time" aria-label="Increase Time">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
        </svg>
      </button>
    </div>
    
  </div>

  <script src="popup.js"></script>
</body>
</html>
